<!DOCTYPE html>
<html>
<head>
    <title>Professional Wealth Audit</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .main-content { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #e2e8f0; padding: 10px; border: 1px solid #cbd5e1; }
        td { padding: 10px; border: 1px solid #cbd5e1; text-align: right; }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>Wealth Advisor Tool</h1>
        <label>Initial Capital: </label>
        <input type="number" id="totalCap" value="100000">
        <button onclick="runDetailedAnalysis()">Generate 30-Year Report</button>

        <div id="reportOutput"></div>
    </div>

    <script>
    function runDetailedAnalysis() {
        const capital = parseFloat(document.getElementById('totalCap').value);
        const inflationRate = 0.03;
        const years = 30;
        let currentWealth = capital;
        let reportData = [];

        for (let y = 1; y <= years; y++) {
            let growth = currentWealth * 0.07;
            let tax = growth * 0.20;
            let insurance = 1200;
            let netYearlyChange = growth - tax - insurance;
            currentWealth += netYearlyChange;
            let inflationAdjustedValue = currentWealth / Math.pow((1 + inflationRate), y);

            reportData.push({
                year: y,
                nominalWealth: currentWealth.toFixed(0),
                realWealth: inflationAdjustedValue.toFixed(0),
                taxPaid: tax.toFixed(0)
            });
        }
        displayTable(reportData);
    }

    function displayTable(data) {
        let container = document.getElementById('reportOutput');
        let html = `<h2>30-Year Strategic Wealth Audit</h2><table>
                    <tr><th>Year</th><th>Nominal Wealth</th><th>Real Value</th><th>Tax Paid</th></tr>`;
        
        data.forEach(row => {
            html += `<tr>
                <td>${row.year}</td>
                <td>$${parseInt(row.nominalWealth).toLocaleString()}</td>
                <td>$${parseInt(row.realWealth).toLocaleString()}</td>
                <td>$${parseInt(row.taxPaid).toLocaleString()}</td>
            </tr>`;
        });
        
        html += `</table>`;
        container.innerHTML = html;
    }
    </script>
</body>
</html>
